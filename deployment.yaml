apiVersion: apps/v1
kind: Deployment
metadata:
 name: flask-app
spec:
 replicas: 3
 selector:
  matchLabels:
   app: flask-app
 template:
  metadata:
   labels:
    app: flask-app
  spec:
   containers:
   - name: flask-app
     image: byh321/flask-app:aedca25553182381449e96bd680491beb3856d83
     ports:
     - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
 name: flask-service
spec:
 type: LoadBalancer
 selector:
  app: flask-app
 ports:
 - port: 80
   targetPort: 5000
